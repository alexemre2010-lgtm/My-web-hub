<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A clean personal link hub landing page" />
    <title>Link Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light mode">🌙</button>

    <div class="app-shell">
      <main class="profile-card" aria-labelledby="profile-name">
        <header class="profile-header">
          <img
            class="avatar"
            src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=600&q=80"
            alt="Porsche profile image"
          />
          <h1 id="profile-name">Alex</h1>
          <p class="tagline">Student • Creator • Friend</p>
        </header>

        <p class="bio">I am a student at Mount Hebron.</p>

        <nav class="link-list" aria-label="Quick links">
          <a class="link-button" href="https://www.instagram.com/alex_martin201017" target="_blank" rel="noreferrer">📸 Instagram</a>
          <a class="link-button" href="https://github.com/AlexMartin201017" target="_blank" rel="noreferrer">💻 GitHub</a>
        </nav>

        <footer class="footer">
          <p>Connect with me and discover what I’m building next.</p>
        </footer>
      </main>
    </div>
    <script>
      const toggleButton = document.getElementById('themeToggle');
      const body = document.body;

      function applyTheme(theme) {
        body.classList.toggle('light-mode', theme === 'light');
        toggleButton.textContent = theme === 'light' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
      }

      const savedTheme = localStorage.getItem('theme') || 'dark';
      applyTheme(savedTheme);

      toggleButton.addEventListener('click', () => {
        const nextTheme = body.classList.contains('light-mode') ? 'dark' : 'light';
        applyTheme(nextTheme);
      });
    </script>
  </body>
</html>
